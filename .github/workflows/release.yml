name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          output="domain-proxy-${{ matrix.suffix }}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "$output" .

      - name: Compress
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "domain-proxy-${{ matrix.suffix }}.zip" "domain-proxy-${{ matrix.suffix }}${{ matrix.ext }}"
          else
            tar czf "domain-proxy-${{ matrix.suffix }}.tar.gz" "domain-proxy-${{ matrix.suffix }}${{ matrix.ext }}"
          fi

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: domain-proxy-${{ matrix.suffix }}
          path: domain-proxy-${{ matrix.suffix }}.*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
