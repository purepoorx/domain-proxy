name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          output="domain-proxy-${{ matrix.suffix }}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "$output" .
          echo "ARTIFACT=$output" >> "$GITHUB_ENV"

      - name: Compress (tar.gz for unix, zip for windows)
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "domain-proxy-${{ matrix.suffix }}.zip" "${{ env.ARTIFACT }}"
            echo "ARCHIVE=domain-proxy-${{ matrix.suffix }}.zip" >> "$GITHUB_ENV"
          else
            tar czf "domain-proxy-${{ matrix.suffix }}.tar.gz" "${{ env.ARTIFACT }}"
            echo "ARCHIVE=domain-proxy-${{ matrix.suffix }}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
